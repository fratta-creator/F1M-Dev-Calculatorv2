<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="F1 Dev">
<title>F1 Manager — Dev Calculator</title>
<link id="manifest-link" rel="manifest">
<style>
:root{--bg:#0f0f13;--bg2:#1a1a24;--bg3:#22222e;--border:#2a2a35;--text:#e2e2e8;--muted:#777;--hint:#444;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px}
#root{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}

/* ── Language screen ── */
#lang-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;gap:32px;padding:32px;
}
.lang-logo{font-size:52px;margin-bottom:4px}
.lang-title{font-size:20px;font-weight:700;letter-spacing:-.3px;text-align:center}
.lang-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:4px}
.lang-options{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px}
.lang-btn{
  display:flex;align-items:center;gap:14px;
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:16px 20px;cursor:pointer;transition:.15s;width:100%;
}
.lang-btn:active{transform:scale(.97)}
.lang-btn:hover{border-color:#555}
.lang-flag{font-size:28px;flex-shrink:0}
.lang-name{text-align:left}
.lang-name strong{display:block;font-size:15px;font-weight:600;color:#e2e2e8}
.lang-name span{font-size:12px;color:#777;margin-top:1px;display:block}
.lang-check{margin-left:auto;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.lang-btn.selected{border-color:#4a9eff;background:#4a9eff12}
.lang-btn.selected .lang-check{background:#4a9eff;border-color:#4a9eff;color:#fff}
.lang-confirm{
  width:100%;max-width:280px;padding:14px;
  background:#e8453c;border:none;border-radius:12px;
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:.15s;
}
.lang-confirm:active{transform:scale(.97);background:#c73530}
.lang-confirm:disabled{background:var(--bg2);color:var(--muted);cursor:default}

/* ── App shell ── */
#app-shell{display:flex;flex-direction:column;height:100%}
.header{padding:12px 16px 8px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:600}
.header-lang{font-size:18px;cursor:pointer;padding:2px 6px;border-radius:6px;border:1px solid transparent;transition:.1s}
.header-lang:hover{border-color:var(--border)}
.tabbar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tabbar button{flex:1;padding:10px 2px;border:none;background:none;color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tabbar button.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.content{flex:1;overflow-y:auto;padding:12px 14px 40px;-webkit-overflow-scrolling:touch}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.card-sm{background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.rank-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:4px 0}
.bar-fill{height:100%;border-radius:3px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;margin-left:38px}
.strategy{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-top:6px;font-size:12px;color:var(--muted);line-height:1.7}
.strategy strong{color:var(--text)}
.strategy h3{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{padding:4px 11px;font-size:11px;cursor:pointer;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-family:inherit}
.chip.active{font-weight:600}
input[type=number]{width:100%;padding:6px 8px;font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;-webkit-appearance:none}
input[type=number]:focus{outline:none;border-color:#4a9eff}
.slabel{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.input-group label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.impact-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer}
.impact-comp{font-size:12px;font-weight:500;width:110px;flex-shrink:0}
.impact-bar-wrap{flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative}
.impact-bar{height:100%;border-radius:3px;position:absolute;top:0;left:0}
.impact-val{font-size:11px;font-weight:600;width:42px;text-align:right;flex-shrink:0}
.impact-pct{font-size:10px;color:var(--hint);width:28px;text-align:right;flex-shrink:0}
.impact-detail{font-size:10px;color:var(--hint);margin-left:118px;margin-bottom:8px;line-height:1.6;padding-bottom:8px;border-bottom:1px solid #1a1a24}
.impact-detail:last-child{border-bottom:none}
#install-banner{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#4a9eff;color:#fff;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px #0006;z-index:999;border:none;font-family:inherit}
</style>
</head>
<body>

<!-- Language selection screen -->
<div id="lang-screen">
  <div>
    <div class="lang-logo" style="text-align:center">🏎</div>
    <div class="lang-title">F1 Manager 2024<br>Dev Calculator</div>
  </div>
  <div class="lang-options">
    <button class="lang-btn" onclick="selectLang('pt')" id="btn-pt">
      <span class="lang-flag">🇧🇷</span>
      <div class="lang-name">
        <strong>Português</strong>
        <span>Brasil</span>
      </div>
      <div class="lang-check" id="chk-pt"></div>
    </button>
    <button class="lang-btn" onclick="selectLang('en')" id="btn-en">
      <span class="lang-flag">🇺🇸</span>
      <div class="lang-name">
        <strong>English</strong>
        <span>United States</span>
      </div>
      <div class="lang-check" id="chk-en"></div>
    </button>
  </div>
  <button class="lang-confirm" id="lang-confirm" disabled onclick="confirmLang()">—</button>
</div>

<!-- Main app -->
<div id="app-shell" style="display:none">
  <div class="header">
    <h1>F1 Manager 2024</h1>
    <span class="header-lang" onclick="showLangScreen()" title="Change language" id="header-flag">🇧🇷</span>
  </div>
  <div class="tabbar" id="tabbar"></div>
  <div class="content" id="content"></div>
</div>
<button id="install-banner" onclick="installApp()">⬇️ Install</button>

<script>
/* ══════════════════════════════════════════════
   TRANSLATIONS
   ══════════════════════════════════════════════ */

/* ══════════════════════════════════════════════
   CONTRIBUTION TABLE (Mike Takumi's Guide)
   ══════════════════════════════════════════════ */
const CONTRIB = {

  asaDiant: {                     lowSpeed:55,    medSpeed:20, highSpeed:12.5, dirtyAir:40, tyre:20              },

  sidepods: { topSpeed:20,                        medSpeed:12.5,highSpeed:10,               engineCool:80        },
  assoalho: { topSpeed:10,        lowSpeed:17.5,  medSpeed:15, highSpeed:30,   dirtyAir:30                      },
  suspensao:{ topSpeed:20,        lowSpeed:15,    medSpeed:10, highSpeed:5,    tyre:80                           },
};

const ATTR_MAP = {
  sidepods: { arrasto:['topSpeed'], resfMotor:['engineCool'], fluxoDiant:['medSpeed'], fluxoCentral:['medSpeed','highSpeed'] },
  chassi:   { arrasto:['topSpeed'], deltaDRS:['drs'], resfMotor:['engineCool'], fluxoCentral:['medSpeed','highSpeed'] },
  suspensao:{ arrasto:['topSpeed'], velBaixa:['lowSpeed'], velMedia:['medSpeed'], velAlta:['highSpeed'], preservPneu:['tyre'], fluxoDiant:['lowSpeed','medSpeed'] },
  assoalho: { arrasto:['topSpeed'], velBaixa:['lowSpeed'], velMedia:['medSpeed'], velAlta:['highSpeed'], sensFluAr:['dirtyAir'] },
  asaDiant: { velBaixa:['lowSpeed'], velMedia:['medSpeed'], velAlta:['highSpeed'], preservPneu:['tyre'], sensFluAr:['dirtyAir'], fluxoDiant:['lowSpeed','medSpeed'] },
  asaTras:  { arrasto:['topSpeed'], deltaDRS:['drs'], velBaixa:['lowSpeed'], velMedia:['medSpeed'], velAlta:['highSpeed'], sensFluAr:['dirtyAir'] },
};

/* Bilingual component/attribute labels */
const COMP_LABELS = {
  pt: {
    sidepods:{label:"Sidepods",    attrs:{arrasto:"Red. arrasto",resfMotor:"Resfr. motor",fluxoDiant:"Fluxo dianteiro",fluxoCentral:"Fluxo central"}},
    chassi:  {label:"Chassi",     attrs:{arrasto:"Red. arrasto",deltaDRS:"Delta de DRS",resfMotor:"Resfr. motor",fluxoCentral:"Fluxo central"}},
    suspensao:{label:"Suspensão",  attrs:{arrasto:"Red. arrasto",velBaixa:"Vel. baixa",velMedia:"Vel. média",velAlta:"Vel. alta",preservPneu:"Preserv. pneus",fluxoDiant:"Fluxo dianteiro"}},
    assoalho:{label:"Assoalho",   attrs:{arrasto:"Red. arrasto",velBaixa:"Vel. baixa",velMedia:"Vel. média",velAlta:"Vel. alta",sensFluAr:"Sensib. fluxo ar"}},
    asaDiant:{label:"Asa Dianteira",attrs:{velBaixa:"Vel. baixa",velMedia:"Vel. média",velAlta:"Vel. alta",preservPneu:"Preserv. pneus",sensFluAr:"Sensib. fluxo ar",fluxoDiant:"Fluxo dianteiro"}},
    asaTras: {label:"Asa Traseira",attrs:{arrasto:"Red. arrasto",deltaDRS:"Delta de DRS",velBaixa:"Vel. baixa",velMedia:"Vel. média",velAlta:"Vel. alta",sensFluAr:"Sensib. fluxo ar"}},
  },
  en: {
    sidepods:{label:"Sidepods",    attrs:{arrasto:"Drag reduction",resfMotor:"Engine cooling",fluxoDiant:"Front airflow",fluxoCentral:"Central airflow"}},
    chassi:  {label:"Chassis",    attrs:{arrasto:"Drag reduction",deltaDRS:"DRS delta",resfMotor:"Engine cooling",fluxoCentral:"Central airflow"}},
    suspensao:{label:"Suspension", attrs:{arrasto:"Drag reduction",velBaixa:"Low speed",velMedia:"Med speed",velAlta:"High speed",preservPneu:"Tyre preservation",fluxoDiant:"Front airflow"}},
    assoalho:{label:"Underfloor", attrs:{arrasto:"Drag reduction",velBaixa:"Low speed",velMedia:"Med speed",velAlta:"High speed",sensFluAr:"Airflow sensitivity"}},
    asaDiant:{label:"Front Wing",  attrs:{velBaixa:"Low speed",velMedia:"Med speed",velAlta:"High speed",preservPneu:"Tyre preservation",sensFluAr:"Airflow sensitivity",fluxoDiant:"Front airflow"}},
    asaTras: {label:"Rear Wing",   attrs:{arrasto:"Drag reduction",deltaDRS:"DRS delta",velBaixa:"Low speed",velMedia:"Med speed",velAlta:"High speed",sensFluAr:"Airflow sensitivity"}},
  }
};

const CAR_STAT_LABELS = {
  pt:{ topSpeed:'Velocidade Máxima', drs:'Eficácia do DRS', lowSpeed:'Curvas Vel. Baixa', medSpeed:'Curvas Vel. Média', highSpeed:'Curvas Vel. Alta', dirtyAir:'Tolerância Ar Sujo', tyre:'Preservação Pneus', engineCool:'Resfr. Motor' },
  en:{ topSpeed:'Top Speed', drs:'DRS Effectiveness', lowSpeed:'Low Speed Cornering', medSpeed:'Medium Speed Cornering', highSpeed:'High Speed Cornering', dirtyAir:'Dirty Air Tolerance', tyre:'Tyre Preservation', engineCool:'Engine Cooling' },
};
const CAR_STAT_ICONS = { topSpeed:'🏎', drs:'⚡', lowSpeed:'↙', medSpeed:'↗', highSpeed:'🔝', dirtyAir:'💨', tyre:'🔴', engineCool:'🌡' };

const COMP_UNITS = {
  sidepods: {arrasto:"%",resfMotor:"%",fluxoDiant:"%",fluxoCentral:"%"},
  chassi:   {arrasto:"%",deltaDRS:"%",resfMotor:"%",fluxoCentral:"%"},
  suspensao:{arrasto:"%",velBaixa:"kN",velMedia:"kN",velAlta:"kN",preservPneu:"%",fluxoDiant:"%"},
  assoalho: {arrasto:"%",velBaixa:"kN",velMedia:"kN",velAlta:"kN",sensFluAr:"%"},
  asaDiant: {velBaixa:"kN",velMedia:"kN",velAlta:"kN",preservPneu:"%",sensFluAr:"%",fluxoDiant:"%"},
  asaTras:  {arrasto:"%",deltaDRS:"%",velBaixa:"kN",velMedia:"kN",velAlta:"kN",sensFluAr:"%"},
};

const COMP_ORDER = ['sidepods','chassi','suspensao','assoalho','asaDiant','asaTras'];
const COMP_COLORS = {sidepods:"#e8453c",chassi:"#f5a623",suspensao:"#4a9eff",assoalho:"#1ec776",asaDiant:"#a259ff",asaTras:"#00c9c9"};

const DEFAULTS = {
  sidepods:{arrasto:{mine:52.60,avg:61.46},resfMotor:{mine:54.60,avg:59.55},fluxoDiant:{mine:52.60,avg:62.77},fluxoCentral:{mine:52.60,avg:46.01}},
  chassi:{arrasto:{mine:52.60,avg:55.49},deltaDRS:{mine:50.60,avg:51.95},resfMotor:{mine:54.60,avg:53.17},fluxoCentral:{mine:52.60,avg:56.94}},
  suspensao:{arrasto:{mine:67.02,avg:57.21},velBaixa:{mine:4.21,avg:4.17},velMedia:{mine:6.15,avg:6.18},velAlta:{mine:7.52,avg:7.56},preservPneu:{mine:63.79,avg:50.94},fluxoDiant:{mine:46.92,avg:57.09}},
  assoalho:{arrasto:{mine:52.60,avg:55.96},velBaixa:{mine:4.05,avg:4.14},velMedia:{mine:6.05,avg:6.15},velAlta:{mine:7.53,avg:7.55},sensFluAr:{mine:52.60,avg:56.64}},
  asaDiant:{velBaixa:{mine:4.29,avg:4.17},velMedia:{mine:6.29,avg:6.18},velAlta:{mine:7.64,avg:7.56},preservPneu:{mine:60.28,avg:48.94},sensFluAr:{mine:68.87,avg:57.79},fluxoDiant:{mine:71.18,avg:58.45}},
  asaTras:{arrasto:{mine:65.09,avg:55.90},deltaDRS:{mine:62.34,avg:56.98},velBaixa:{mine:4.39,avg:4.16},velMedia:{mine:6.15,avg:6.15},velAlta:{mine:7.68,avg:7.56},sensFluAr:{mine:68.95,avg:57.36}},
};

/* ══════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════ */
function initData(){
  const d={};
  COMP_ORDER.forEach(k=>{
    d[k]={};
    Object.keys(DEFAULTS[k]).forEach(a=>{d[k][a]={mine:DEFAULTS[k][a].mine,avg:DEFAULTS[k][a].avg};});
  });
  return d;
}
function loadState(){
  try{const s=JSON.parse(localStorage.getItem("f1calc_v43")||"null");if(s&&s.data)return s;}catch(e){}
  return{tab:"ranking",activeComp:"sidepods",activeStat:"lowSpeed",lang:null,data:initData()};
}
let S=loadState();
function save(){try{localStorage.setItem("f1calc_v43",JSON.stringify(S));}catch(e){}}

// Current language helpers
function t(){return T[S.lang||'pt'];}
function compLabel(k){return COMP_LABELS[S.lang||'pt'][k].label;}
function attrLabel(k,a){return COMP_LABELS[S.lang||'pt'][k].attrs[a]||a;}
function statLabel(s){return CAR_STAT_LABELS[S.lang||'pt'][s]||s;}

/* ══════════════════════════════════════════════
   SCORE ENGINE
   ══════════════════════════════════════════════ */
function attrWeight(compKey,attrKey){
  const stats=ATTR_MAP[compKey]?.[attrKey]||[];
  const c=CONTRIB[compKey]||{};
  return stats.reduce((sum,s)=>sum+(c[s]||0),0);
}
function calcScore(compKey){
  let total=0;
  Object.keys(DEFAULTS[compKey]).forEach(a=>{
    const d=S.data[compKey][a]||{mine:0,avg:0};
    const def=(parseFloat(d.avg)||0)-(parseFloat(d.mine)||0);
    const w=attrWeight(compKey,a);
    if(def>0&&w>0) total+=def*w;
  });
  return total;
}
function getRanked(){
  return COMP_ORDER
    .map(k=>({key:k,score:calcScore(k)}))
    .sort((a,b)=>b.score-a.score).map((s,i)=>({...s,rank:i+1}));
}

/* ══════════════════════════════════════════════
   IMPACT ENGINE
   ══════════════════════════════════════════════ */
function getStatImpact(carStat){
  return COMP_ORDER
    .filter(k=>CONTRIB[k]?.[carStat])
    .map(compKey=>{
      const contrib=CONTRIB[compKey][carStat];
      const relevant=Object.keys(DEFAULTS[compKey]).filter(a=>(ATTR_MAP[compKey]?.[a]||[]).includes(carStat));
      const avgDef=relevant.length
        ?relevant.reduce((sum,a)=>{const d=S.data[compKey][a]||{mine:0,avg:0};return sum+((parseFloat(d.avg)||0)-(parseFloat(d.mine)||0));},0)/relevant.length
        :null;
      return{compKey,contrib,relevant,avgDef,hasTarget:relevant.length>0,impact:avgDef!==null?avgDef*(contrib/100):0};
    })
    .sort((a,b)=>b.impact-a.impact);
}

/* ── HELPERS ── */
function rc(r){return r===1?"#e8453c":r===2?"#f5a623":r===3?"#4a9eff":"#555";}
function rl(r){const L=t();return[L.rank1,L.rank2,L.rank3,L.rank4][r-1]||L.rank4;}
function hx(c,a){return c+Math.round(a*255).toString(16).padStart(2,"0");}
function defStr(def,unit){
  if(def>0.001) return`<span style="color:#e8453c">-${def.toFixed(2)}${unit}</span>`;
  if(def<-0.001) return`<span style="color:#1ec776">+${Math.abs(def).toFixed(2)}${unit}</span>`;
  return`<span style="color:var(--hint)">≈0${unit}</span>`;
}

/* ══════════════════════════════════════════════
   LANGUAGE SCREEN
   ══════════════════════════════════════════════ */
let pendingLang=null;
function selectLang(lang){
  pendingLang=lang;
  ['pt','en'].forEach(l=>{
    document.getElementById('btn-'+l).classList.toggle('selected',l===lang);
    document.getElementById('chk-'+l).textContent=l===lang?'✓':'';
  });
  const btn=document.getElementById('lang-confirm');
  btn.disabled=false;
  btn.textContent=lang==='pt'?'Confirmar':'Confirm';
}
function confirmLang(){
  if(!pendingLang)return;
  S.lang=pendingLang;save();
  document.getElementById('lang-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  document.getElementById('header-flag').textContent=S.lang==='pt'?'🇧🇷':'🇺🇸';
  document.getElementById('install-banner').textContent=t().installBtn;
  buildTabbar();
  render();
}
function showLangScreen(){
  pendingLang=S.lang;
  if(S.lang){
    document.getElementById('btn-'+S.lang).classList.add('selected');
    document.getElementById('chk-'+S.lang).textContent='✓';
    const btn=document.getElementById('lang-confirm');
    btn.disabled=false;
    btn.textContent=S.lang==='pt'?'Confirmar':'Confirm';
  }
  document.getElementById('lang-screen').style.display='flex';
}
function buildTabbar(){
  const L=t();
  document.getElementById('tabbar').innerHTML=L.tabs.map((lbl,i)=>
    `<button${S.tab===L.tabKeys[i]?' class="active"':''} onclick="setTab('${L.tabKeys[i]}',this)">${lbl}</button>`
  ).join('');
}

/* ══════════════════════════════════════════════
   RENDER RANKING
   ══════════════════════════════════════════════ */
function renderRanking(){
  const L=t();
  const list=getRanked();
  const mx=Math.max(...list.map(r=>r.score),0.01);
  let h=`<div class="slabel">${L.rankLabel}</div>`;
  list.forEach(r=>{
    const defs=Object.keys(DEFAULTS[r.key]).map(a=>{
      const d=S.data[r.key][a]||{mine:0,avg:0};
      const def=(parseFloat(d.avg)||0)-(parseFloat(d.mine)||0);
      const w=attrWeight(r.key,a);
      return{label:attrLabel(r.key,a),def,w};
    }).filter(x=>x.def>0&&x.w>0).sort((a,b)=>b.def*b.w-a.def*a.w);
    const pct=Math.round((r.score/mx)*100);
    const col=rc(r.rank);
    h+=`<div class="card">
      <div class="rank-header">
        <div class="rank-num" style="background:${hx(col,.15)};color:${col}">${r.rank}°</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:14px;font-weight:600">${compLabel(r.key)}</span>
            <span class="badge" style="background:${hx(col,.18)};color:${col}">${rl(r.rank)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
          <div style="font-size:10px;color:var(--hint);margin-top:2px">${L.score}: ${r.score.toFixed(1)}</div>
        </div>
      </div>
      <div class="tags">
        ${defs.length===0
          ?`<span class="badge" style="background:#1ec77622;color:#1ec776">${L.aboveAvg}</span>`
          :defs.map(d=>`<span class="badge" style="background:#e8453c22;color:#e8453c">${d.label}: -${d.def.toFixed(2)} (${d.w.toFixed(0)}%)</span>`).join("")}
      </div>
    </div>`;
  });
  h+=`<div class="strategy">
    <h3>${L.strategy}</h3>
    ${L.stratText(compLabel(list[0].key),list[1].score>list[0].score*0.3?compLabel(list[1].key):'',compLabel(list[2].key))}
    <br><br><span style="color:var(--hint);font-size:11px">${L.stratTip}</span>
  </div>`;
  return h;
}

/* ══════════════════════════════════════════════
   RENDER PESQUISA / RESEARCH
   ══════════════════════════════════════════════ */
function renderPesquisa(){
  const L=t();
  let h=`<div class="chips">
    ${COMP_ORDER.map(k=>`
      <button class="chip${S.activeComp===k?" active":""}"
        style="${S.activeComp===k?`border-color:${COMP_COLORS[k]};background:${hx(COMP_COLORS[k],.12)};color:${COMP_COLORS[k]}`:""}"
        onclick="selComp('${k}')">${compLabel(k)}</button>`).join("")}
  </div>`;
  Object.keys(DEFAULTS[S.activeComp]).forEach(a=>{
    const d=S.data[S.activeComp][a]||{mine:0,avg:0};
    const def=(parseFloat(d.avg)||0)-(parseFloat(d.mine)||0);
    const isGood=def<=0;
    const w=attrWeight(S.activeComp,a);
    const unit=COMP_UNITS[S.activeComp][a]||'%';
    const targetStats=(ATTR_MAP[S.activeComp]?.[a]||[]).map(s=>statLabel(s)).join(' + ');
    h+=`<div class="card-sm">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div>
          <div style="font-size:13px;font-weight:500">${attrLabel(S.activeComp,a)}</div>
          <div style="font-size:10px;color:var(--hint);margin-top:2px">
            ${targetStats?'→ '+targetStats+' · ':''} ${L.weight}: ${w.toFixed(0)}%
          </div>
        </div>
        <span class="badge" style="background:${isGood?"#1ec77622":"#e8453c22"};color:${isGood?"#1ec776":"#e8453c"}">
          ${isGood?"+"+Math.abs(def).toFixed(2)+" above":"-"+Math.abs(def).toFixed(2)+" below"}
        </span>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>${L.yourCar} (${unit})</label>
          <input type="number" step="0.01" value="${d.mine}" onchange="updVal('${S.activeComp}','${a}','mine',this.value)">
        </div>
        <div class="input-group">
          <label>${L.opponent} (${unit})</label>
          <input type="number" step="0.01" value="${d.avg}" onchange="updVal('${S.activeComp}','${a}','avg',this.value)">
        </div>
      </div>
    </div>`;
  });
  return h;
}

/* ══════════════════════════════════════════════
   RENDER IMPACTO / IMPACT
   ══════════════════════════════════════════════ */
function renderImpacto(){
  const L=t();
  let h=`<div class="slabel">${L.statLabel}</div>
  <div class="chips">
    ${Object.keys(CAR_STAT_LABELS.pt).map(k=>`
      <button class="chip${S.activeStat===k?" active":""}"
        style="${S.activeStat===k?"border-color:#4a9eff;background:#4a9eff22;color:#4a9eff":""}"
        onclick="selStat('${k}')">${CAR_STAT_ICONS[k]} ${statLabel(k)}</button>`).join("")}
  </div>`;

  const impacts=getStatImpact(S.activeStat);
  if(!impacts.length){h+=`<div class="card-sm" style="color:var(--muted)">${L.noComp}</div>`;return h;}

  const targetable=impacts.filter(x=>x.hasTarget);
  const passive=impacts.filter(x=>!x.hasTarget&&x.contrib>0);
  const maxImp=Math.max(...targetable.map(x=>Math.abs(x.impact)),0.01);

  h+=`<div class="slabel" style="margin-top:4px">${CAR_STAT_ICONS[S.activeStat]} ${statLabel(S.activeStat)}</div>
  <div class="card" style="padding:12px 14px">`;

  if(targetable.length){
    h+=`<div style="font-size:10px;color:var(--hint);margin-bottom:8px">${L.targetable}</div>`;
    targetable.forEach(item=>{
      const isNeg=item.impact>0;
      const col=isNeg?"#e8453c":"#1ec776";
      const barPct=item.impact!==0?Math.round((Math.abs(item.impact)/maxImp)*100):0;
      const sign=isNeg?"-":"+";
      h+=`<div class="impact-row" onclick="selCompAndTab('${item.compKey}')">
        <div class="impact-comp" style="color:${COMP_COLORS[item.compKey]}">${compLabel(item.compKey)}</div>
        <div class="impact-bar-wrap"><div class="impact-bar" style="width:${barPct}%;background:${hx(col,.35)};border:1px solid ${hx(col,.6)}"></div></div>
        <div class="impact-val" style="color:${col}">${sign}${Math.abs(item.impact).toFixed(2)}</div>
        <div class="impact-pct">${item.contrib}%</div>
      </div>
      <div class="impact-detail">
        ${item.relevant.map(a=>{
          const d=S.data[item.compKey][a]||{mine:0,avg:0};
          const def=(parseFloat(d.avg)||0)-(parseFloat(d.mine)||0);
          const unit=COMP_UNITS[item.compKey][a]||'%';
          return`<strong style="color:var(--text)">${attrLabel(item.compKey,a)}:</strong> ${defStr(def,unit)}`;
        }).join(' &nbsp;·&nbsp; ')}
      </div>`;
    });
  }
  if(passive.length){
    h+=`<div style="font-size:10px;color:var(--hint);margin-top:${targetable.length?12:0}px;margin-bottom:4px;padding-top:${targetable.length?12:0}px;border-top:${targetable.length?"1px solid var(--border)":"none"}">
      ${L.residual}: ${passive.map(p=>compLabel(p.compKey)+' '+p.contrib+'%').join(', ')}
    </div>`;
  }
  h+=`</div>
  <div class="card-sm" style="margin-top:8px;font-size:12px;color:var(--muted);line-height:1.7">
    <strong style="color:var(--text)">${L.howToRead}:</strong> ${L.howToReadText}
  </div>`;
  return h;
}

/* ── ACTIONS ── */
function setTab(t,btn){
  S.tab=t;save();
  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");render();
}
function selComp(k){S.activeComp=k;save();render();}
function selStat(k){S.activeStat=k;save();render();}
function selCompAndTab(compKey){
  S.activeComp=compKey;S.tab='pesquisa';save();
  document.querySelectorAll(".tabbar button").forEach((b,i)=>{b.classList.remove("active");if(i===1)b.classList.add("active");});
  render();
}
function updVal(comp,key,field,value){
  if(!S.data[comp][key])S.data[comp][key]={mine:0,avg:0};
  S.data[comp][key][field]=parseFloat(value)||0;
  save();render();
}
function render(){
  const map={ranking:renderRanking,pesquisa:renderPesquisa,impacto:renderImpacto};
  document.getElementById("content").innerHTML=(map[S.tab]||renderRanking)();
}

/* ── INIT ── */
if(S.lang){
  document.getElementById('lang-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  document.getElementById('header-flag').textContent=S.lang==='pt'?'🇧🇷':'🇺🇸';
  document.getElementById('install-banner').textContent=t().installBtn;
  buildTabbar();render();
} else {
  // Pre-select based on browser language
  const bl=navigator.language||'';
  if(bl.startsWith('pt')) selectLang('pt');
  else if(bl.startsWith('en')) selectLang('en');
}
